<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buy Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {background: #000;color: white;font-family: 'Poppins', sans-serif;text-align: center;padding: 15px;}
h1 {font-family: 'UnifrakturCook', cursive;font-size: 38px;color: #ff1a1a;margin-bottom: 8px;text-shadow: 0 0 10px rgba(255,0,0,0.5);}
.input-group {margin: 15px 0;text-align: left;width: 92%;margin-left: auto;margin-right: auto;}
label {font-size: 14px;color: #aaa;margin-bottom: 5px;display: block;}
.warn-text {font-size: 12px;color: #ffdd00;margin-top: -8px;margin-bottom: 8px;display: block;}
input[type="number"], input[type="text"] {width: 100%;padding: 14px;font-size: 16px;border-radius: 10px;border: 2px solid #333;background: #111;color: white;box-sizing: border-box;}
.glass-btn {width: 92%;padding: 15px;background: rgba(255, 0, 0, 0.15);backdrop-filter: blur(12px);border: 1px solid rgba(255, 0, 0, 0.4);font-size: 18px;color: #ffffff;font-weight: 700;border-radius: 15px;margin-top: 15px;cursor: pointer;box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);}
#toast {visibility: hidden;min-width: 260px;background-color: #ff1a1a;color: white;text-align: center;border-radius: 12px;padding: 14px;position: fixed;bottom: 30px;left: 50%;transform: translateX(-50%);font-size: 16px;font-weight: 600;z-index: 99999;opacity: 0;transition: opacity 0.3s;}
#toast.show {visibility: visible;opacity: 1;bottom: 50px;}
#coinRate {font-size: 15px;color: #00e5ff;margin-top: 8px;font-weight: 600;}
#depositStatus {margin-top: 12px;font-size: 15px;font-weight: 600;color: #00e5ff;}

/* CUSTOM DROPDOWN */
.country-wrapper {position: relative;}
#countryDisplay {width: 100%;padding: 14px;font-size: 16px;border-radius: 10px;border: 2px solid #333;background: #111;color: white;box-sizing: border-box;cursor: pointer;text-align: left;}
#countryDropdown {display: none;position: absolute;top: 100%;left: 0;right: 0;background: #111;border: 2px solid #333;border-radius: 10px;margin-top: 5px;z-index: 1000;max-height: 250px;overflow-y: auto;}
#countrySearch {width: 100%;padding: 12px;font-size: 15px;border: none;border-bottom: 1px solid #333;background: #000;color: white;box-sizing: border-box;border-radius: 10px 10px 0 0;outline: none;}
.country-option {padding: 12px 14px;cursor: pointer;color: white;text-align: left;}
.country-option:hover {background: rgba(255,0,0,0.15);}
.country-option.hidden {display: none;}
</style>
</head>
<body>

<h1>Deposit Coins</h1>
<p class="subtitle">Power up your Dark Magic Ai Bot</p>

<div class="input-group">
    <label>Enter your 1WIN ID <span style="color:#ff1a1a;">*Required</span></label>
    <span class="warn-text">⚠️ Note: Your 1Win ID only links you to the bot. Depositing here will NOT reflect in your 1Win account. Double check your ID, coins can be lost if wrong.</span>
    <input type="text" id="onewinIdInput" placeholder="Enter your 1WIN ID" inputmode="numeric" pattern="[0-9]*" />
</div>

<div class="input-group">
    <label>Select Your African Country</label>
    <div class="country-wrapper">
        <div id="countryDisplay">-- Search and Select Country --</div>
        <div id="countryDropdown">
            <input type="text" id="countrySearch" placeholder="Search country..." />
            <div id="countryOptions"></div>
        </div>
    </div>
</div>

<div class="input-group">
    <label id="amountLabel">Enter Deposit Amount</label>
    <input type="number" id="depositAmount" placeholder="Select country first" min="1" step="any" />
    <div id="coinRate"></div>
</div>

<button class="glass-btn" id="submitDepositBtn">💰 Buy Coins Now</button>
<div id="depositStatus"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
// SECURE SERVER-SIDE VERIFICATION:
// The backend confirms each payment directly with Flutterwave before
// crediting coins. No secret keys live in this page anymore.
const VERIFY_URL = "https://telegram-guard.replit.app/api/onewin/verify-payment";

const firebaseConfig = {apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",authDomain: "bets-d795d.firebaseapp.com",databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",projectId: "bets-d795d"};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const countryDisplay = document.getElementById("countryDisplay");
const countryDropdown = document.getElementById("countryDropdown");
const countrySearch = document.getElementById("countrySearch");
const countryOptions = document.getElementById("countryOptions");
const depositInput = document.getElementById("depositAmount");
const amountLabel = document.getElementById("amountLabel");
const coinRate = document.getElementById("coinRate");
const onewinInput = document.getElementById("onewinIdInput");
let selectedCountry = "", flutterwaveKey = null;

const AFRICAN_RATES = {
    "NG": {name: "Nigeria 🇳🇬", currency: "NGN", symbol: "₦", rate: 1, flutterwave: "NGN", minAmount: 1000, coins: 5},
    "GH": {name: "Ghana 🇬🇭", currency: "GHS", symbol: "GH₵", rate: 0.045, flutterwave: "GHS", minAmount: 45, coins: 10},
    "ZA": {name: "South Africa 🇿🇦", currency: "ZAR", symbol: "R", rate: 0.11, flutterwave: "ZAR", minAmount: 25, coins: 5},
    "KE": {name: "Kenya 🇰🇪", currency: "KES", symbol: "KSh", rate: 2.3, flutterwave: "KES", minAmount: 200, coins: 5},
    "UG": {name: "Uganda 🇺🇬", currency: "UGX", symbol: "USh", rate: 70, flutterwave: "UGX", minAmount: 3000, coins: 5},
    "TZ": {name: "Tanzania 🇹🇿", currency: "TZS", symbol: "TSh", rate: 45, flutterwave: "TZS", minAmount: 2500, coins: 5},
    "CM": {name: "Cameroon 🇨🇲", currency: "XAF", symbol: "FCFA", rate: 12, flutterwave: "XAF", minAmount: 1000, coins: 5},
    "SN": {name: "Senegal 🇸🇳", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5},
    "CI": {name: "Ivory Coast 🇨🇮", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5},
    "BJ": {name: "Benin 🇧🇯", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5},
    "BW": {name: "Botswana 🇧🇼", currency: "BWP", symbol: "P", rate: 3.5, flutterwave: "BWP", minAmount: 100, coins: 5},
    "TG": {name: "Togo 🇹🇬", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5},
    "NE": {name: "Niger 🇳🇪", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5},
    "MW": {name: "Malawi 🇲🇼", currency: "MWK", symbol: "MK", rate: 80, flutterwave: "MWK", minAmount: 2000, coins: 5},
    "ZM": {name: "Zambia 🇿🇲", currency: "ZMW", symbol: "ZK", rate: 5, flutterwave: "ZMW", minAmount: 25, coins: 5},
    "ZW": {name: "Zimbabwe 🇿🇼", currency: "ZWL", symbol: "ZiG", rate: 6, flutterwave: "ZWL", minAmount: 30, coins: 5},
    // ADDED
    "BF": {name: "Burkina Faso 🇧🇫", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5},
    "GM": {name: "Gambia 🇬🇲", currency: "GMD", symbol: "D", rate: 1, flutterwave: "GMD", minAmount: 75, coins: 5}
};

document.addEventListener("DOMContentLoaded", () => {
    // Build country list
    Object.keys(AFRICAN_RATES).forEach(code => {
        const div = document.createElement("div");
        div.className = "country-option";
        div.setAttribute("data-code", code);
        div.textContent = AFRICAN_RATES[code].name;
        div.onclick = () => selectCountry(code, AFRICAN_RATES[code].name);
        countryOptions.appendChild(div);
    });

    const savedId = localStorage.getItem("onewinId");
    if(savedId) onewinInput.value = savedId;

    checkPendingPayment();
});

function toast(msg) {const t = document.getElementById("toast");t.innerHTML = msg;t.className = "show";setTimeout(() => t.className = "", 3500);}

// Open/Close dropdown
countryDisplay.onclick = () => {
    countryDropdown.style.display = countryDropdown.style.display === "block"? "none" : "block";
    if(countryDropdown.style.display === "block") countrySearch.focus();
}
document.addEventListener("click", (e) => {
    if(!e.target.closest(".country-wrapper")) countryDropdown.style.display = "none";
})

// Search filter
countrySearch.oninput = () => {
    const filter = countrySearch.value.toLowerCase();
    document.querySelectorAll(".country-option").forEach(opt => {
        opt.classList.toggle("hidden",!opt.textContent.toLowerCase().includes(filter));
    })
}

function selectCountry(code, name) {
    selectedCountry = code;
    countryDisplay.textContent = name;
    countryDropdown.style.display = "none";
    countrySearch.value = "";

    const c = AFRICAN_RATES[selectedCountry];
    const coinPrice = Math.ceil(c.minAmount / c.coins);
    amountLabel.innerHTML = `Enter Deposit Amount (${c.symbol})`;
    depositInput.placeholder = `Min ${c.symbol}${c.minAmount}`;
    depositInput.min = c.minAmount;
    depositInput.value = "";
    coinRate.innerHTML = `${c.symbol}${coinPrice} = 1 Coin | Min Deposit: ${c.symbol}${c.minAmount} = ${c.coins} Coins`;
}

function validateAmount(amount, countryCode) {
    const c = AFRICAN_RATES[countryCode];
    if(!c) return {valid: false, msg: "Select country first"};
    if (amount < c.minAmount) return { valid: false, msg: `Minimum deposit is ${c.symbol}${c.minAmount}` };
    const coins = Math.floor(amount / (c.minAmount / c.coins));
    if (coins < c.coins) return { valid: false, msg: `Minimum ${c.coins} coins. Deposit at least ${c.symbol}${c.minAmount}` };
    return { valid: true, coins };
}

// Ask OUR backend to confirm the payment with Flutterwave and credit coins.
async function verifyWithServer(tx_ref) {
    try {
        const response = await fetch(VERIFY_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ tx_ref: tx_ref })
        });
        return await response.json();
    } catch(e) {return {success: false, error: "network", message: "Server connection error"};}
}

async function verifyAndCredit(buyer1winId, tx_ref) {
    document.getElementById("depositStatus").innerHTML = "⏳ Verifying payment...";

    // Retry a few times — the payment can take a moment to appear on
    // Flutterwave's side right after checkout.
    let result = null;
    for (let attempt = 0; attempt < 4; attempt++) {
        result = await verifyWithServer(tx_ref);
        if (result.success || (result.error!== "not_found" && result.error!== "network")) break;
        document.getElementById("depositStatus").innerHTML = "⏳ Still confirming payment... please wait";
        await new Promise(r => setTimeout(r, 4000));
    }
    document.getElementById("depositStatus").innerHTML = "";

    if (result && result.success) {
        await db.ref("public_transactions").push({
            type: "deposit", coins: result.coins, ref: tx_ref, time: Date.now(), onewinId: buyer1winId
        }).catch(()=>{});

        localStorage.removeItem("lastPayment");
        toast(`✅ +${result.coins} Coins Credited! Check your bot balance.`);
        setTimeout(() => { window.location.href = "index.html"; }, 2500);
    } else if (result && result.error === "not_found") {
        // Payment still processing — the Flutterwave webhook will credit
        // the coins automatically within a few minutes.
        localStorage.removeItem("lastPayment");
        toast("⏳ Payment is processing. Your coins will be credited automatically — check your bot balance in a few minutes.");
    } else if (result && result.error === "not_successful") {
        localStorage.removeItem("lastPayment");
        toast("❌ Payment was not completed. No coins were credited.");
    } else {
        toast(`❌ ${(result && (result.message || result.error)) || "Verification failed. Contact support with ref: " + tx_ref}`);
    }
}

function checkPendingPayment() {
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get("status");
    const tx_ref = urlParams.get("tx_ref");
    const saved = JSON.parse(localStorage.getItem("lastPayment") || "{}");

    if (status && tx_ref && saved.tx_ref === tx_ref) {
        if (status === "cancelled" || status === "failed") {
            localStorage.removeItem("lastPayment");
            toast("Payment was not completed");
        } else {
            // Whatever the URL says, the SERVER decides using Flutterwave.
            verifyAndCredit(saved.buyer1winId, tx_ref);
        }
    } else if (saved.tx_ref) {
        // Buyer came back without URL params (e.g. closed the checkout tab
        // after paying) — still check with the server just in case.
        verifyAndCredit(saved.buyer1winId, saved.tx_ref);
    }
}

// LOAD FLUTTERWAVE KEY WITH ERROR CHECK
db.ref("settings/flutterwaveKeys/public").once("value").then(snap => {
    flutterwaveKey = snap.val() || "";
    if(!flutterwaveKey) {
        toast("⚠️ Payment key failed to load. Check Firebase Rules");
        console.log("Flutterwave key is null");
    }
}).catch(err => {
    toast("⚠️ Cannot read payment key. Check Firebase Rules");
    console.error(err);
});

async function startPayment(amountRaw, coins, countryCode, buyer1winId) {
    const c = AFRICAN_RATES[countryCode];
    let payment_options = "card";
    if(countryCode === "NG") payment_options = "card, banktransfer, ussd";
    // IMPORTANT: tx_ref now includes the buyer's 1WIN ID so the backend
    // (and the Flutterwave webhook) know who to credit even if the buyer
    // never returns to this page. Format: DM-<1winID>-<timestamp>
    const tx_ref = "DM-" + buyer1winId + "-" + Date.now();

    const randomNum = Math.floor(Math.random() * 90000) + 10000;
    const guestEmail = `guest${randomNum}@darkmagic.ai`;

    localStorage.setItem("onewinId", buyer1winId);
    localStorage.setItem("lastPayment", JSON.stringify({tx_ref, coins, amountRaw, countryCode, buyer1winId}));

    FlutterwaveCheckout({
        public_key: flutterwaveKey,
        tx_ref: tx_ref,
        amount: amountRaw,
        currency: c.flutterwave,
        payment_options: payment_options,
        redirect_url: window.location.href.split("?")[0],
        customer: { email: guestEmail },
        meta: { onewin_id: buyer1winId, coins: coins },
        callback: async function (response) {
            // Never trust the checkout response alone — the server verifies
            // with Flutterwave before crediting anything.
            await verifyAndCredit(buyer1winId, tx_ref);
        },
        onclose: () => toast("Payment window closed")
    });
}

document.getElementById("submitDepositBtn").onclick = () => {
    const buyer1winId = onewinInput.value.trim();
    if (!buyer1winId) return toast("Please enter your 1Win ID");
    if (!/^[0-9]+$/.test(buyer1winId)) return toast("Your 1Win ID must be numbers only");
    if (!selectedCountry) return toast("Please select your country");
    const amountRaw = Number(depositInput.value);
    if (!amountRaw || amountRaw <= 0) return toast("Enter a valid amount");
    const check = validateAmount(amountRaw, selectedCountry);
    if (!check.valid) return toast(check.msg);
    if (!flutterwaveKey) return toast("Payment key not loaded. Refresh page.");
    startPayment(amountRaw, check.coins, selectedCountry, buyer1winId);
};
</script>
</body>
</html>
