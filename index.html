<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buy Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {background: #000;color: white;font-family: 'Poppins', sans-serif;text-align: center;padding: 15px;}
h1 {font-family: 'UnifrakturCook', cursive;font-size: 38px;color: #ff1a1a;margin-bottom: 8px;text-shadow: 0 0 10px rgba(255,0,0,0.5);}
.input-group {margin: 15px 0;text-align: left;width: 92%;margin-left: auto;margin-right: auto;}
label {font-size: 14px;color: #aaa;margin-bottom: 5px;display: block;}
.warn-text {font-size: 12px;color: #ffdd00;margin-top: -8px;margin-bottom: 8px;display: block;}
select, input[type="number"], input[type="text"] {width: 100%;padding: 14px;font-size: 16px;border-radius: 10px;border: 2px solid #333;background: #111;color: white;box-sizing: border-box;}
select {appearance: none; -webkit-appearance: none; -moz-appearance: none;}
.glass-btn {width: 92%;padding: 15px;background: rgba(255, 0, 0, 0.15);backdrop-filter: blur(12px);border: 1px solid rgba(255, 0, 0, 0.4);font-size: 18px;color: #ffffff;font-weight: 700;border-radius: 15px;margin-top: 15px;cursor: pointer;box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);}
#toast {visibility: hidden;min-width: 260px;background-color: #ff1a1a;color: white;text-align: center;border-radius: 12px;padding: 14px;position: fixed;bottom: 30px;left: 50%;transform: translateX(-50%);font-size: 16px;font-weight: 600;z-index: 99999;opacity: 0;transition: opacity 0.3s;}
#toast.show {visibility: visible;opacity: 1;bottom: 50px;}
#coinRate {font-size: 15px;color: #00e5ff;margin-top: 8px;font-weight: 600;}
#depositStatus {margin-top: 12px;font-size: 15px;font-weight: 600;color: #00e5ff;}
</style>
</head>
<body>

<h1>Deposit Coins</h1>
<p class="subtitle">Power up your Dark Magic Ai Bot</p>

<div class="input-group">
    <label>Enter Your 1Win ID <span style="color:#ff1a1a;">*Required</span></label>
    <span class="warn-text">⚠️ Note: Your 1Win ID only links you to the bot. Depositing here will NOT reflect in your 1Win account. Double check your ID, coins can be lost if wrong.</span>
    <input type="text" id="onewinIdInput" placeholder="Enter numbers only" />
</div>

<div class="input-group">
    <label>Select Your African Country</label>
    <select id="countrySelect">
        <option value="">-- Choose Country --</option>
    </select>
</div>

<div class="input-group">
    <label id="amountLabel">Enter Deposit Amount</label>
    <input type="number" id="depositAmount" placeholder="Select country first" min="1" step="any" />
    <div id="coinRate"></div>
</div>

<button class="glass-btn" id="submitDepositBtn">💰 Buy Coins Now</button>
<div id="depositStatus"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
const REPLIT_CREDIT_KEY = "WK-16c8aff1b67922fb3c46ed5b41a3e216";

const firebaseConfig = {apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",authDomain: "bets-d795d.firebaseapp.com",databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",projectId: "bets-d795d"};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const countrySelect = document.getElementById("countrySelect");
const depositInput = document.getElementById("depositAmount");
const amountLabel = document.getElementById("amountLabel");
const coinRate = document.getElementById("coinRate");
const onewinInput = document.getElementById("onewinIdInput");
let selectedCountry = "", flutterwaveKey = null;

const AFRICAN_RATES = {
    "NG": {name: "Nigeria 🇳🇬", currency: "NGN", symbol: "₦", rate: 1, flutterwave: "NGN", minAmount: 1000, coins: 5},
    "GH": {name: "Ghana 🇬🇭", currency: "GHS", symbol: "GH₵", rate: 0.045, flutterwave: "GHS", minAmount: 45, coins: 10},
    "ZA": {name: "South Africa 🇿🇦", currency: "ZAR", symbol: "R", rate: 0.11, flutterwave: "ZAR", minAmount: 25, coins: 5},
    "KE": {name: "Kenya 🇰🇪", currency: "KES", symbol: "KSh", rate: 2.3, flutterwave: "KES", minAmount: 200, coins: 5},
    "UG": {name: "Uganda 🇺🇬", currency: "UGX", symbol: "USh", rate: 70, flutterwave: "UGX", minAmount: 3000, coins: 5},
    "TZ": {name: "Tanzania 🇹🇿", currency: "TZS", symbol: "TSh", rate: 45, flutterwave: "TZS", minAmount: 2500, coins: 5},
    "CM": {name: "Cameroon 🇨🇲", currency: "XAF", symbol: "FCFA", rate: 12, flutterwave: "XAF", minAmount: 1000, coins: 5},
    "SN": {name: "Senegal 🇸🇳", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF", minAmount: 1000, coins: 5}
};

document.addEventListener("DOMContentLoaded", () => {
    Object.keys(AFRICAN_RATES).forEach(code => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = AFRICAN_RATES[code].name;
        countrySelect.appendChild(opt);
    });

    const savedId = localStorage.getItem("onewinId");
    if(savedId) onewinInput.value = savedId;

    checkPendingPayment();
});

function toast(msg) {const t = document.getElementById("toast");t.innerHTML = msg;t.className = "show";setTimeout(() => t.className = "", 3500);}

countrySelect.onchange = () => {
    selectedCountry = countrySelect.value;
    if(!selectedCountry) {
        coinRate.innerHTML = "";
        depositInput.placeholder = "Select country first";
        amountLabel.innerHTML = `Enter Deposit Amount`;
        return;
    }

    const c = AFRICAN_RATES[selectedCountry];
    if(!c) {
        toast("Invalid country selected");
        return;
    }

    const coinPrice = Math.ceil(c.minAmount / c.coins);
    amountLabel.innerHTML = `Enter Deposit Amount (${c.symbol})`;
    depositInput.placeholder = `Min ${c.symbol}${c.minAmount}`;
    depositInput.min = c.minAmount;
    depositInput.value = "";
    coinRate.innerHTML = `${c.symbol}${coinPrice} = 1 Coin | Min Deposit: ${c.symbol}${c.minAmount} = ${c.coins} Coins`;
};

function validateAmount(amount, countryCode) {
    const c = AFRICAN_RATES[countryCode];
    if(!c) return {valid: false, msg: "Select country first"};
    if (amount < c.minAmount) return { valid: false, msg: `Minimum deposit is ${c.symbol}${c.minAmount}` };
    const coins = Math.floor(amount / (c.minAmount / c.coins));
    if (coins < c.coins) return { valid: false, msg: `Minimum ${c.coins} coins. Deposit at least ${c.symbol}${c.minAmount}` };
    return { valid: true, coins };
}

async function creditCoinsViaReplit(buyer1winId, coins, paymentOrderId) {
    try {
        const response = await fetch("https://telegram-guard.replit.app/api/onewin/credit", {
            method: "POST",
            headers: {"Content-Type": "application/json","X-Credit-Key": REPLIT_CREDIT_KEY},
            body: JSON.stringify({registration_id: buyer1winId,coins: coins,order_id: paymentOrderId})
        });
        return await response.json();
    } catch(e) {return {success: false, message: "Server connection error"};}
}

async function verifyAndCredit(buyer1winId, coins, tx_ref) {
    document.getElementById("depositStatus").innerHTML = "⏳ Verifying payment...";
    const result = await creditCoinsViaReplit(buyer1winId, coins, tx_ref);
    if (result.success) {
        await db.ref("public_transactions").push({
            type: "deposit", coins: coins, ref: tx_ref, time: Date.now(), onewinId: buyer1winId
        });

        localStorage.removeItem("lastPayment");
        document.getElementById("depositStatus").innerHTML = "";
        toast(`✅ +${coins} Coins Credited! Check your bot balance.`);
        setTimeout(() => { window.location.href = "main.html"; }, 2500);
    } else {
        document.getElementById("depositStatus").innerHTML = "";
        toast(`❌ ${result.message || result.error || "Crediting failed. Contact support."}`);
    }
}

function checkPendingPayment() {
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get("status");
    const tx_ref = urlParams.get("tx_ref");
    const saved = JSON.parse(localStorage.getItem("lastPayment") || "{}");

    if (status && tx_ref && saved.tx_ref === tx_ref) {
        if (status === "successful" || status === "completed") {
            verifyAndCredit(saved.buyer1winId, saved.coins, saved.tx_ref);
        } else {
            localStorage.removeItem("lastPayment");
            toast("Payment was not completed");
        }
    }
}

// LOAD FLUTTERWAVE KEY WITH ERROR CHECK
db.ref("settings/flutterwaveKeys/public").once("value").then(snap => {
    flutterwaveKey = snap.val() || "";
    if(!flutterwaveKey) {
        toast("⚠️ Payment key failed to load. Check Firebase Rules");
        console.log("Flutterwave key is null");
    }
}).catch(err => {
    toast("⚠️ Cannot read payment key. Check Firebase Rules");
    console.error(err);
});

async function startPayment(amountRaw, coins, countryCode, buyer1winId) {
    const c = AFRICAN_RATES[countryCode];
    let payment_options = "card";
    if(countryCode === "NG") payment_options = "card, banktransfer, ussd";
    const tx_ref = "DM-" + Date.now();

    const randomNum = Math.floor(Math.random() * 90000) + 10000;
    const guestEmail = `guest${randomNum}@darkmagic.ai`;

    localStorage.setItem("onewinId", buyer1winId);
    localStorage.setItem("lastPayment", JSON.stringify({tx_ref, coins, amountRaw, countryCode, buyer1winId}));

    FlutterwaveCheckout({
        public_key: flutterwaveKey,
        tx_ref: tx_ref,
        amount: amountRaw,
        currency: c.flutterwave,
        payment_options: payment_options,
        redirect_url: window.location.href.split("?")[0],
        customer: { email: guestEmail },
        callback: async function (response) {
            if (response.status === "successful" || response.status === "completed") {
                await verifyAndCredit(buyer1winId, coins, tx_ref);
            }
        },
        onclose: () => toast("Payment window closed")
    });
}

document.getElementById("submitDepositBtn").onclick = () => {
    const buyer1winId = onewinInput.value.trim();
    if (!buyer1winId) return toast("Please enter your 1Win ID");
    if (!selectedCountry) return toast("Please select your country");
    const amountRaw = Number(depositInput.value);
    if (!amountRaw || amountRaw <= 0) return toast("Enter a valid amount");
    const check = validateAmount(amountRaw, selectedCountry);
    if (!check.valid) return toast(check.msg);
    if (!flutterwaveKey) return toast("Payment key not loaded. Refresh page.");
    startPayment(amountRaw, check.coins, selectedCountry, buyer1winId);
};
</script>
</body>
</html>
